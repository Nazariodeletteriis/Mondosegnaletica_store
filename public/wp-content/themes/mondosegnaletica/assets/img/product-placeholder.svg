<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <rect width="600" height="600" fill="#141313"/>
  <!-- Hairline border -->
  <rect x="1" y="1" width="598" height="598" fill="none" stroke="#F5F4F026" stroke-width="1"/>
  <!-- Road sign icon — triangolo pericolo stilizzato -->
